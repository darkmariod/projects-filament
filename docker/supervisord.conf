; ============================================================
; Supervisor config — Sistema Garantías
; Manages: Nginx | PHP-FPM | Cron daemon
; ============================================================

[supervisord]
nodaemon = true
user = root
logfile = /dev/null
logfile_maxbytes = 0
pidfile = /var/run/supervisord.pid

[program:nginx]
command = nginx -g "daemon off;"
autostart = true
autorestart = true
startretries = 5
stopwaitsecs = 5
stdout_logfile = /dev/stdout
stdout_logfile_maxbytes = 0
stderr_logfile = /dev/stderr
stderr_logfile_maxbytes = 0

[program:php-fpm]
command = php-fpm -F
autostart = true
autorestart = true
startretries = 5
stopwaitsecs = 5
stdout_logfile = /dev/stdout
stdout_logfile_maxbytes = 0
stderr_logfile = /dev/stderr
stderr_logfile_maxbytes = 0

[program:cron]
command = cron -f -L 15
autostart = true
autorestart = true
startretries = 3
stopwaitsecs = 3
stdout_logfile = /dev/stdout
stdout_logfile_maxbytes = 0
stderr_logfile = /dev/stderr
stderr_logfile_maxbytes = 0
